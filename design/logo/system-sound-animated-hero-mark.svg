<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" role="img" aria-labelledby="title desc">
  <title id="title">SYSTEM / SOUND Animated Hero Mark</title>
  <desc id="desc">The Formal Mark with an auxiliary ivory track and a red teardrop signal that travels once from the lower terminal to the upper terminal.</desc>
  <style>
    .terminal { animation: terminal-release 10.5s 1.15s ease-in-out 1 both; }
    .track { stroke-dasharray: 520; stroke-dashoffset: 520; animation: draw 1.4s .32s ease-out forwards; }
    .signal { opacity: 0; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes terminal-release { 0%, 6% { opacity: 1; } 14%, 88% { opacity: 0; } 100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .terminal { animation: none; opacity: 1; }
      .track { animation: none; stroke-dashoffset: 0; }
      .signal { display: none; }
    }
  </style>
  <path fill="#050505" d="M175 20C191 21 204 34 208 52C211 64 203 72 193 71C184 70 179 64 181 55C182 49 186 45 190 42L174 22C158 27 149 42 145 62C140 85 142 130 143 173C143 181 145 184 149 188L144 194C143 225 141 252 132 280C124 304 106 326 84 338C72 343 55 335 43 323C31 311 27 293 34 282C40 272 53 269 62 278C70 286 68 300 58 311L84 336C99 319 109 299 113 267C117 234 116 210 118 184L114 177L118 169C119 145 119 116 123 91C129 56 145 30 161 24C166 22 171 20 175 20Z"/>
  <path class="track" d="M175 30C158 35 149 56 146 84C142 113 143 145 142 171C141 191 141 220 136 253C131 283 111 318 84 333" fill="none" stroke="#F2EDE3" stroke-width="2.4" stroke-linecap="round" opacity=".72"/>
  <path class="terminal" fill="#E33A2F" d="M84 338C72 343 55 335 43 323C31 311 27 293 34 282C40 272 53 269 62 278C70 286 68 300 58 311L84 336Z"/>
  <path class="signal" d="M0-5C3-3 3 2 0 5C-3 2-3-3 0-5Z" fill="#E33A2F">
    <animateMotion begin="1.15s" dur="10.5s" repeatCount="1" rotate="auto" path="M84 333C111 318 131 283 136 253C141 220 141 191 142 171C143 145 142 113 146 84C149 56 158 35 175 30"/>
    <animate attributeName="opacity" begin="1.15s" dur="10.5s" values="0;1;1;0" keyTimes="0;.06;.9;1" repeatCount="1"/>
  </path>
</svg>
