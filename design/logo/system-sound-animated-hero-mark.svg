<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" role="img" aria-labelledby="title desc">
  <title id="title">SYSTEM / SOUND Animated Hero Mark</title>
  <desc id="desc">The Formal Mark with an auxiliary ivory track and a red teardrop signal that travels once from the lower terminal to the upper terminal.</desc>
  <style>
    .terminal { animation: terminal-release 10.5s 1.15s ease-in-out 1 both; }
    .track { stroke-dasharray: 520; stroke-dashoffset: 520; animation: draw 1.4s .32s ease-out forwards; }
    .signal { opacity: 0; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes terminal-release { 0%, 6% { opacity: 1; } 14%, 88% { opacity: 0; } 100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .terminal { animation: none; opacity: 1; }
      .track { animation: none; stroke-dashoffset: 0; }
      .signal { display: none; }
    }
  </style>
  <path fill="#050505" d="M115 22C130 19 145 26 153 41C161 57 159 77 156 95C152 117 144 140 138 157C135 166 135 174 145 180L136 182C130 183 126 189 124 198C116 220 109 241 105 263C101 284 104 304 114 316C123 326 134 326 142 318C136 315 131 309 132 301C132 291 140 283 150 283C161 283 168 293 167 306C168 323 154 337 136 342C113 347 91 335 80 315C69 296 70 270 75 244C79 224 83 206 85 195C86 187 84 182 78 178L89 175C96 172 101 164 106 154C119 128 130 102 137 78C142 61 139 45 130 43C122 41 116 46 116 54C116 61 121 65 128 64C127 71 122 77 114 80C102 84 90 77 87 66C82 52 88 37 100 28C105 25 110 23 115 22Z"/>
  <path class="track" d="M120 31C143 43 146 63 140 88C133 118 121 146 113 168C106 187 102 207 96 232C90 260 88 291 101 317C109 333 123 338 136 334" fill="none" stroke="#F2EDE3" stroke-width="2.4" stroke-linecap="round" opacity=".72"/>
  <path class="terminal" fill="#E33A2F" d="M142 318C138 326 132 336 126 341L136 342C151 338 162 329 166 317C157 322 149 322 142 318Z"/>
  <path class="signal" d="M0-5C3-3 3 2 0 5C-3 2-3-3 0-5Z" fill="#E33A2F">
    <animateMotion begin="1.15s" dur="10.5s" repeatCount="1" rotate="auto" path="M136 334C123 338 109 333 101 317C88 291 90 260 96 232C102 207 106 187 113 168C121 146 133 118 140 88C146 63 143 43 120 31"/>
    <animate attributeName="opacity" begin="1.15s" dur="10.5s" values="0;1;1;0" keyTimes="0;.06;.9;1" repeatCount="1"/>
  </path>
</svg>
