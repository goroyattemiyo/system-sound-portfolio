<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" role="img" aria-labelledby="title desc">
  <title id="title">SYSTEM / SOUND Animated Hero Mark — Varnish Glint</title>
  <desc id="desc">A single black Formal Mark. Fine wine-red and ivory reflections travel upward like a varnished-surface glint.</desc>
  <style>
    .wine,.bright,.ivory{opacity:0}.wine{stroke-dasharray:.09 1;animation:wine 10s .8s linear infinite}.bright{stroke-dasharray:.045 1;animation:bright 10s .8s linear infinite}.ivory{stroke-dasharray:.026 1;animation:ivory 10s .92s linear infinite}
    @keyframes wine{0%{opacity:0;stroke-dashoffset:0}3%{opacity:.48}15%{opacity:.36}19%{opacity:0;stroke-dashoffset:-.91}100%{opacity:0;stroke-dashoffset:-.91}}
    @keyframes bright{0%,2%{opacity:0;stroke-dashoffset:-.014}5%{opacity:.28}15%{opacity:.18}19%{opacity:0;stroke-dashoffset:-.924}100%{opacity:0;stroke-dashoffset:-.924}}
    @keyframes ivory{0%,3%{opacity:0;stroke-dashoffset:-.032}6%{opacity:.2}14%{opacity:.12}18%{opacity:0;stroke-dashoffset:-.942}100%{opacity:0;stroke-dashoffset:-.942}}
    @media(prefers-reduced-motion:reduce){.wine,.bright,.ivory{display:none}}
  </style>
