  <path class="bright" d="M136 334C123 338 109 333 101 317C88 291 90 260 96 232C102 207 106 187 113 168C121 146 133 118 140 88C146 63 143 43 120 31" pathLength="1" fill="none" stroke="#A64050" stroke-width="1.25" stroke-linecap="round"/>
  <path class="ivory" d="M136 334C123 338 109 333 101 317C88 291 90 260 96 232C102 207 106 187 113 168C121 146 133 118 140 88C146 63 143 43 120 31" pathLength="1" fill="none" stroke="#F2EDE3" stroke-width=".8" stroke-linecap="round"/>
